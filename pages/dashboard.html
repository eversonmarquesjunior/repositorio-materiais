      <nav class="sidebar-nav">

    <div class="app-main">
      <header class="app-header">
        <div class="header-inner">
          <a href="../index.html" class="logo-wrap">
            <div class="logo-icon">
              <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <polygon fill="#CFD8DC" points="39.4,23 38.6,19 26,21.6 26,8 22,8 22,20.3 8.1,11.3 5.9,14.7 21.1,24.5 9.4,39.8 12.6,42.2 23.9,27.4 32.3,40.1 35.7,37.9 27.3,25.4"/>
                <circle fill="#3F51B5" cx="24" cy="24" r="7"/>
                <g fill="#00BCD4">
                  <circle cx="24" cy="8" r="5"/>
                  <circle cx="39" cy="21" r="5"/>
                  <circle cx="7" cy="13" r="5"/>
                  <circle cx="11" cy="41" r="5"/>
                  <circle cx="34" cy="39" r="5"/>

            <div class="logo-text">
              <span class="logo-name">Repositório</span>
              <span class="logo-sub">Acervo de Disciplinas</span>
            </div>
          </a>
          <button id="sidebarToggle" class="sidebar-toggle" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="4" y1="7" x2="20" y2="7"/>
              <line x1="4" y1="12" x2="20" y2="12"/>
              <line x1="4" y1="17" x2="20" y2="17"/>

          <nav class="header-nav">
        <a href="../index.html" class="nav-link">Pesquisar</a>


          <button id="themeToggle" class="theme-btn" title="Alternar tema">
            <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="page-content">
        <div class="page-shell">
          <h1 class="page-title">Dashboard</h1>
          <p class="page-empty">Conteúdo do dashboard será adicionado em breve.</p>
        </div>
      </main>
    </div>
  </div>

  <script>
    const btn = document.getElementById('themeToggle');
    const sun = document.getElementById('iconSun');
    const moon = document.getElementById('iconMoon');
    const saved = localStorage.getItem('repo-theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    if (saved === 'dark') { sun.style.display='none'; moon.style.display='block'; }
    btn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('repo-theme', next);
      if (next === 'dark') { sun.style.display='none'; moon.style.display='block'; }
      else { sun.style.display='block'; moon.style.display='none'; }
    });
  </script>
  <script src="../js/ui.js"></script>
