      <main class="page-content">
        <div class="page-shell">
          <h1 class="page-title">Adicionar Disciplina</h1>
          <form id="addDisciplineForm" class="add-form">
            <div class="form-group">
              <label for="nome">Nome *</label>
              <input type="text" id="nome" name="nome" required placeholder="Ex: Cálculo Diferencial e Integral I" />
            </div>
            <div class="form-group" id="disciplinaPaiGroup">
              <label for="disciplinaPaiSearch">Mesmo material de</label>
              <div class="ac-wrap">
                <input type="text" id="disciplinaPaiSearch" placeholder="Pesquisar disciplina..." autocomplete="off" />
                <div class="ac-dropdown" id="disciplinaPaiDropdown"></div>
              </div>
              <div class="ac-selected" id="disciplinaPaiSelected" style="display:none">
                <span id="disciplinaPaiSelectedName"></span>
                <button type="button" id="disciplinaPaiClear" class="ac-clear-btn" aria-label="Remover vínculo">✕</button>
              </div>
              <input type="hidden" id="disciplinaPaiId" name="disciplinaPaiId" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Modelo *</label>
                <div id="modeloCheckboxes" class="modelo-checkboxes">
                  <label class="modelo-check-label"><input type="checkbox" class="modelo-cb" value="Graduação"> Graduação</label>
                  <label class="modelo-check-label"><input type="checkbox" class="modelo-cb" value="Pós-graduação"> Pós-graduação</label>
                  <label class="modelo-check-label"><input type="checkbox" class="modelo-cb" value="Curso Inova"> Curso Inova</label>
                  <label class="modelo-check-label"><input type="checkbox" class="modelo-cb" value="Graduação & Pós"> Graduação &amp; Pós</label>
                </div>
              </div>
              <div class="form-group">
                <label for="status">Tipo de Disciplina (especificar quando necessário)</label>
                <select id="status" name="status" style="width:100%">
                  <option value="">Selecione o tipo</option>
                  <option value="ace">Ace</option>
                  <option value="estagio">Estágio</option>
                  <option value="padrao_unificada">Padrão Unificada</option>
                  <option value="projeto_integrador">Projeto Integrador</option>
                  <option value="pratica_conectada">Prática Conectada</option>
                  <option value="introducao_ao_curso">Introdução ao Curso</option>
                  <option value="pap">Projeto em Ambiente Profissional</option>
                  <option value="outro">Outro</option>
                </select>
              </div>
              <div class="form-group">
                <label for="modulo">Status</label>
                <div style="display:flex; gap:8px; align-items:stretch">
                  <select id="modulo" name="modulo" style="flex:1; min-width:0">
                    <option value="">Selecione um status</option>
                    <option value="comum">Disciplina Comum</option>
                    <option value="antiga">Disciplina Origem Grad.</option>
                    <option value="atualizacao">Atualização do Zero</option>
                    <option value="paliativa">Disciplina Paliativa</option>
                  </select>
                  <input type="number" id="anoAntiga" name="anoAntiga" min="1950" max="2099"
                         placeholder="Ano" style="display:none; width:80px; flex-shrink:0" />
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkMoodleWAE">
                <span>Link Moodle WAE</span>
              </label>
              <input type="url" id="linkMoodleWAE" name="linkMoodleWAE" disabled placeholder="https://moodle.exemplo.com/..." />
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkDPWAE">
                <span>Link DP WAE</span>
              </label>
              <input type="url" id="linkDPWAE" name="linkDPWAE" disabled placeholder="https://..." />
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkMoodleERP">
                <span>Link Moodle ERP</span>
              </label>
              <input type="url" id="linkMoodleERP" name="linkMoodleERP" disabled placeholder="https://moodle.exemplo.com/..." />
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkDPERP">
                <span>Link DP ERP</span>
              </label>
              <input type="url" id="linkDPERP" name="linkDPERP" disabled placeholder="https://..." />
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkMoodlePos">
                <span>Link Moodle Pós</span>
              </label>
              <input type="url" id="linkMoodlePos" name="linkMoodlePos" disabled placeholder="https://moodle.exemplo.com/..." />
            </div>
            <div class="form-group">
              <label class="toggle-label">
                <input type="checkbox" class="field-toggle" data-target="linkInova">
                <span>Link Inova</span>
              </label>
              <input type="url" id="linkInova" name="linkInova" disabled placeholder="https://..." />
            </div>
            <div class="form-group">
              <label for="dropbox">Dropbox</label>
              <input type="url" id="dropbox" name="dropbox" placeholder="https://www.dropbox.com/..." />
            </div>
            <div class="form-group">
              <label for="googledrive">Google Drive</label>
              <input type="url" id="googledrive" name="googledrive" placeholder="https://drive.google.com/..." />
            </div>
            <div class="form-group">
              <label for="sharepoint">SharePoint</label>
              <input type="url" id="sharepoint" name="sharepoint" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label for="apostilaHtml">Apostila HTML</label>
              <input type="url" id="apostilaHtml" name="apostilaHtml" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label for="youtube">YouTube</label>
              <input type="url" id="youtube" name="youtube" placeholder="https://www.youtube.com/..." />
            </div>
            <div class="form-group">
              <label for="soundcloud">Soundcloud</label>
              <input type="url" id="soundcloud" name="soundcloud" placeholder="https://soundcloud.com/..." />
            </div>
            <div class="form-group">
              <label for="ementa">Ementa</label>
              <textarea id="ementa" name="ementa" rows="4" placeholder="Ementa da disciplina..."></textarea>
            </div>
            <div class="form-group">
              <label for="observacoes">Observações</label>
              <div class="obs-toolbar">
                <button type="button" id="obsInsertLink" class="obs-toolbar-btn" title="Inserir link">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                  Inserir link
                </button>
              </div>
              <textarea id="observacoes" name="observacoes" rows="4" placeholder="Informações adicionais sobre a disciplina..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Adicionar Disciplina</button>
              <button type="reset" class="btn btn-secondary">Limpar</button>
            </div>
            <div id="formMessage" class="form-message" style="display:none"></div>
          </form>
        </div>
      </main>
    </div>
