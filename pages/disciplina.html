<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe da Disciplina — RepoDisciplinas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <div>
          <p class="sidebar-brand-title">RepoDisciplinas</p>
          <p class="sidebar-brand-sub">Informações</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="../index.html" class="sidebar-link">Pesquisar</a>
        <a href="dashboard.html" class="sidebar-link">Dashboard</a>
        <a href="adicionar-disciplina.html" class="sidebar-link">Adicionar Disciplina</a>
        <a href="sobre.html" class="sidebar-link">Sobre</a>
      </nav>
    </aside>
    <div class="sidebar-backdrop"></div>
    <div class="app-main">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="header-inner">
      <a href="../index.html" class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">RepoDisciplinas</span>
          <span class="logo-sub">Repositório Acadêmico</span>
        </div>
      </a>
      <button id="sidebarToggle" class="sidebar-toggle" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="7" x2="20" y2="7"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="17" x2="20" y2="17"/>
        </svg>
      </button>

      <nav class="header-nav">
        <a href="../index.html" class="nav-link">Pesquisar</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
      </nav>

      <button id="themeToggle" class="theme-btn" title="Alternar tema">
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── BREADCRUMB ── -->
  <div class="breadcrumb-bar">
    <div class="breadcrumb-inner">
      <a href="../index.html" class="bc-link">Início</a>
      <svg class="bc-sep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="bc-link" id="bcArea">—</span>
      <svg class="bc-sep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="bc-current" id="bcNome">Disciplina</span>
    </div>
  </div>

  <!-- ── CONTEÚDO PRINCIPAL ── -->
  <main class="detail-section">
    <div class="detail-inner">

      <!-- Coluna principal -->
      <div class="detail-main">

        <!-- Cabeçalho da disciplina -->
        <div class="detail-hero">
          <div class="detail-badges" id="detailBadges"></div>
          <h1 class="detail-title" id="detailNome">Carregando…</h1>
          <p class="detail-code" id="detailCodigo"></p>
          <div class="detail-meta-row" id="detailMetaRow"></div>
        </div>

        <!-- Ementa -->
        <div class="detail-card" id="cardEmenta" style="display:none">
          <div class="dc-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <h2 class="dc-title">OBSERVAÇÕES</h2>
          </div>
          <div class="dc-body">
            <p class="detail-text" id="detailEmenta"></p>
          </div>
        </div>

        <!-- Removed sections: Objetivos, Conteúdo Programático, Bibliografia, Observações -->

      </div>

      <!-- Coluna lateral (sidebar) -->
      <aside class="detail-sidebar">

        <div class="sidebar-card">
          <h3 class="sc-title">RETORNOS</h3>
          <div class="sc-body" id="sidebarInfo">
            <!-- preenchido via JS -->
          </div>
        </div>

        <div class="sidebar-card" id="scCursos" style="display:none">
          <h3 class="sc-title">ATUALIZAÇÕES</h3>
          <ul class="sc-list" id="sidebarCursos"></ul>
        </div>

        <div class="sidebar-card">
          <h3 class="sc-title">Ações</h3>
          <div class="sc-actions">
            <button onclick="window.print()" class="sc-action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                <rect x="6" y="14" width="12" height="8"/>
              </svg>
              Imprimir
            </button>
            <button id="copyLinkBtn" class="sc-action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              Copiar link
            </button>
          </div>
        </div>

      </aside>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer class="app-footer">
    <div class="footer-inner">
      <span>© <span id="footerYear"></span> Repositório de Disciplinas</span>
      <span class="footer-sep">·</span>
      <span>Versão 1.0</span>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script src="../js/detalhe.js"></script>
  <script src="../js/ui.js"></script>
  </div>
  </div>
</body>
</html>
